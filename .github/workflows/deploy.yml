name: Deploy To AWS App Runner

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY_API: ${{ vars.ECR_REPOSITORY_API }}
  ECR_REPOSITORY_FRONTEND: ${{ vars.ECR_REPOSITORY_FRONTEND }}
  SERVICE_NAME_API: ${{ vars.SERVICE_NAME_API }}
  SERVICE_NAME_FRONTEND: ${{ vars.SERVICE_NAME_FRONTEND }}

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    outputs:
      api_url: ${{ steps.deploy-api.outputs.api_url }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required repository variables
        run: |
          test -n "$AWS_REGION" || (echo "Missing repository variable AWS_REGION" && exit 1)
          test -n "$ECR_REPOSITORY_API" || (echo "Missing repository variable ECR_REPOSITORY_API" && exit 1)
          test -n "$SERVICE_NAME_API" || (echo "Missing repository variable SERVICE_NAME_API" && exit 1)

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build-image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY_API:$IMAGE_TAG"
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_OUTPUT
          docker build -f Dockerfile -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"

      - name: Deploy API to App Runner via AWS SDK
        id: deploy-api
        env:
          SERVICE_NAME: ${{ env.SERVICE_NAME_API }}
          IMAGE_URI: ${{ steps.build-image.outputs.IMAGE_URI }}
          APPRUNNER_ECR_ACCESS_ROLE_ARN: ${{ secrets.APPRUNNER_ECR_ACCESS_ROLE_ARN }}
          CONTAINER_PORT: "8000"
        run: |
          python -m pip install --upgrade pip
          pip install boto3
          DEPLOY_OUTPUT=$(python scripts/deploy_apprunner.py)
          echo "$DEPLOY_OUTPUT"
          API_URL=$(echo "$DEPLOY_OUTPUT" | grep '^SERVICE_URL=' | cut -d'=' -f2-)
          test -n "$API_URL" || (echo "Failed to capture API URL" && exit 1)
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-api
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required repository variables
        run: |
          test -n "$AWS_REGION" || (echo "Missing repository variable AWS_REGION" && exit 1)
          test -n "$ECR_REPOSITORY_FRONTEND" || (echo "Missing repository variable ECR_REPOSITORY_FRONTEND" && exit 1)
          test -n "$SERVICE_NAME_FRONTEND" || (echo "Missing repository variable SERVICE_NAME_FRONTEND" && exit 1)

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend Docker image
        id: build-image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG"
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_OUTPUT
          docker build -f Dockerfile.frontend -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"

      - name: Deploy frontend to App Runner via AWS SDK
        env:
          SERVICE_NAME: ${{ env.SERVICE_NAME_FRONTEND }}
          IMAGE_URI: ${{ steps.build-image.outputs.IMAGE_URI }}
          APPRUNNER_ECR_ACCESS_ROLE_ARN: ${{ secrets.APPRUNNER_ECR_ACCESS_ROLE_ARN }}
          CONTAINER_PORT: "8501"
          RUNTIME_ENV_VARS_JSON: ${{ format('{{"API_BASE_URL":"{0}"}}', needs.deploy-api.outputs.api_url) }}
        run: |
          python -m pip install --upgrade pip
          pip install boto3
          python scripts/deploy_apprunner.py
